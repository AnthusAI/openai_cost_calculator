name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Determine the next release without committing, tagging, or publishing. Ignored when publish_existing_version is set."
        required: true
        type: boolean
        default: true
      publish_existing_version:
        description: "Publish an existing release tag to CodeArtifact, for example 1.0.0. Leave empty for semantic-release."
        required: false
        type: string
        default: ""
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.CODEARTIFACT_AWS_REGION }}
  CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
  CODEARTIFACT_DOMAIN_OWNER: ${{ vars.CODEARTIFACT_DOMAIN_OWNER }}
  CODEARTIFACT_REPOSITORY: ${{ vars.CODEARTIFACT_REPOSITORY }}
  CODEARTIFACT_PACKAGE_NAME: openai-cost-calculator
  PYTHON_VERSION: "3.11"

jobs:
  release:
    name: Semantic Release and CodeArtifact Publish
    runs-on: ubuntu-latest
    if: >-
      github.ref_name == 'main' &&
      (github.event_name == 'workflow_dispatch' || github.actor != 'anthusbot')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ANTHUSBOT_GH_TOKEN || github.token }}

      - name: Select existing release tag
        if: github.event_name == 'workflow_dispatch' && inputs.publish_existing_version != ''
        env:
          PUBLISH_EXISTING_VERSION: ${{ inputs.publish_existing_version }}
        run: |
          version="${PUBLISH_EXISTING_VERSION#v}"
          git fetch --force --tags
          git checkout --detach "v${version}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test tools
        run: python -m pip install --upgrade pip

      - name: Run unit tests
        run: python -m unittest discover -s . -p '*_test.py'

      - name: Release version
        id: release
        if: github.event_name != 'workflow_dispatch' || inputs.publish_existing_version == ''
        uses: python-semantic-release/python-semantic-release@v10.6.1
        with:
          github_token: ${{ secrets.ANTHUSBOT_GH_TOKEN || github.token }}
          git_committer_name: anthusbot
          git_committer_email: anthusbot@users.noreply.github.com
          no_operation_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          build: "false"
          commit: "true"
          tag: "true"
          push: "true"
          changelog: "true"
          vcs_release: "true"
          verbosity: "1"

      - name: Stop when no release was created
        if: >-
          (github.event_name != 'workflow_dispatch' || inputs.publish_existing_version == '') &&
          steps.release.outputs.released != 'true'
        run: echo "No semantic release was created."

      - name: Plan CodeArtifact publish
        id: publish
        env:
          EXISTING_VERSION: ${{ inputs.publish_existing_version || '' }}
          RELEASED: ${{ steps.release.outputs.released || 'false' }}
          RELEASE_VERSION: ${{ steps.release.outputs.version || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          if [ -n "$EXISTING_VERSION" ]; then
            version="${EXISTING_VERSION#v}"
            echo "do_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          elif [ "$RELEASED" = "true" ] && [ "$DRY_RUN" != "true" ]; then
            echo "do_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "do_publish=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build and publish tools
        if: steps.publish.outputs.do_publish == 'true'
        run: python -m pip install build twine

      - name: Verify release version
        if: steps.publish.outputs.do_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.publish.outputs.version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import runpy

          version_globals = runpy.run_path(
              Path("openai_cost_calculator") / "_version.py"
          )
          package_version = version_globals["__version__"]
          release_version = os.environ["RELEASE_VERSION"]
          if package_version != release_version:
              raise SystemExit(
                  f"package version {package_version} does not match "
                  f"semantic-release output {release_version}"
              )
          print(f"Verified openai_cost_calculator release version {release_version}")
          PY

      - name: Build package
        if: steps.publish.outputs.do_publish == 'true'
        run: |
          rm -rf dist
          python -m build
          python -m twine check dist/*

      - name: Verify CodeArtifact configuration
        if: steps.publish.outputs.do_publish == 'true'
        env:
          CODEARTIFACT_PUBLISH_ROLE_ARN: ${{ secrets.CODEARTIFACT_PUBLISH_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$CODEARTIFACT_DOMAIN"
          test -n "$CODEARTIFACT_DOMAIN_OWNER"
          test -n "$CODEARTIFACT_REPOSITORY"
          test -n "$CODEARTIFACT_PUBLISH_ROLE_ARN"

      - name: Configure AWS credentials
        if: steps.publish.outputs.do_publish == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CODEARTIFACT_PUBLISH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish to CodeArtifact
        if: steps.publish.outputs.do_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.publish.outputs.version }}
        run: |
          aws codeartifact login \
            --tool twine \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY"

          twine upload --repository codeartifact dist/*

          published_version="$(
            aws codeartifact list-package-versions \
              --domain "$CODEARTIFACT_DOMAIN" \
              --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
              --repository "$CODEARTIFACT_REPOSITORY" \
              --format pypi \
              --package "$CODEARTIFACT_PACKAGE_NAME" \
              --query "versions[?version=='${RELEASE_VERSION}'].version | [0]" \
              --output text
          )"

          if [ "$published_version" != "$RELEASE_VERSION" ]; then
            echo "CodeArtifact did not return ${CODEARTIFACT_PACKAGE_NAME} version ${RELEASE_VERSION}" >&2
            exit 1
          fi
